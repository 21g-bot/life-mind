name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -B run_pet.py --check
      - run: python -B tools/qa_animation_pack.py --root .cache/demo-character --strict
      - run: python -B tools/validate_contract.py life-package examples/life-package.demo.json
      - run: python -B tools/validate_contract.py capability-manifest examples/capability-manifest.demo.json
      - run: python -B tools/validate_contract.py experience examples/experience.demo.json
      - run: python -B -m unittest discover -s tests
      - run: python -B tools/check_public_release.py
      - run: python -B tools/check_markdown_links.py
